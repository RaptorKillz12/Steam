name: Run Steam with Web Link

on:
  workflow_dispatch: # Allows you to manually trigger the runner via the Actions tab

jobs:
  launch-steam:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Headless Steam Container
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # Use apt-get and quiet flags to bypass the stable CLI interface warning
          sudo apt-get update -y -q
          sudo apt-get install -y -q docker.io
          
          # Deploy the isolated Steam container in the background
          sudo docker run -d \
            --name steam-browser \
            -p 6080:8080 \
            ghcr.io/steam-headless/docker-steam-headless:latest

      - name: Generate and Serve Cloudflare Web Link
        run: |
          # Download the official Cloudflare tunnel binary cleanly
          wget -q 
