name: Run Steam with Web Link

on:
  workflow_dispatch: # Allows you to manually trigger the runner via the Actions tab

jobs:
  launch-steam:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Headless Steam Container
        run: |
          # Docker is already pre-installed by GitHub, so we just run the container directly
          sudo docker run -d \
            --name steam-browser \
            -p 6080:8080 \
            ghcr.io/steam-headless/docker-steam-headless:latest

      - name: Generate and Serve Cloudflare Web Link
        run: |
          # Download the official Cloudflare tunnel binary cleanly
          wget -q https://github.com
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          echo "================================================================"
          echo " SYSTEM STATUS: STEAM IS RUNNING IN BACKGROUND "
          echo " GENERATING TRYSYSTEM TUNNEL URL BELOW... "
          echo "================================================================"
          
          # Spin up the tunnel proxy to route local port 6080 out to the public web
          cloudflared tunnel --url http://localhost:6080
