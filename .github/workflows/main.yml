name: Run Steam with Web Link

on:
  workflow_dispatch:

jobs:
  launch-steam:
    runs-on: ubuntu-latest
    
    steps:
      - name: Start Headless Steam
        run: |
          sudo apt update && sudo apt install -y docker.io
          sudo docker run -d --name steam-browser -p 6080:8080 ghcr.io/steam-headless/docker-steam-headless:latest

      - name: Create Public Web Link
        run: |
          # Download Cloudflare tunnel tool
          wget https://github.com
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          echo "=========================================================="
          echo "CLICK THE LINK BELOW TO OPEN STEAM IN YOUR BROWSER:"
          echo "=========================================================="
          # Start the tunnel and print the generated URL
          cloudflared tunnel --url http://localhost:6080
