name: Run Steam with Web Link

on:
  workflow_dispatch:

jobs:
  launch-steam:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Headless Steam Container
        run: |
          sudo docker run -d \
            --name steam-browser \
            -p 6080:8080 \
            josh5/steam-headless:latest

      - name: Generate and Serve Cloudflare Web Link
        run: |
          # Use curl with a short direct download URL to prevent line breaks
          sudo curl -L -o /usr/local/bin/cloudflared https://github.com
          sudo chmod +x /usr/local/bin/cloudflared
          
          echo "================================================================"
          echo " SYSTEM STATUS: STEAM IS RUNNING IN BACKGROUND "
          echo " GENERATING TRYSYSTEM TUNNEL URL BELOW... "
          echo "================================================================"
          
          # Start the tunnel proxy to route local port 6080 out to the public web
          cloudflared tunnel --url http://localhost:6080
